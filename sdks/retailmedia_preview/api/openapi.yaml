            - billableClicks
            - spend
            type: string
          type: array
        retailerIds:
          description: "Retailer ids to filter. This is not used for security, so\
            \ no need to check for > 0 elements"
          items:
            type: string
          type: array
        startDate:
          description: "Start date (real-time: must be within the last 7 days)."
          format: date-time
          type: string
        timezone:
          default: UTC
          description: "Time zone : see criteo developer portal for supported time\
            \ zones"
          type: string
