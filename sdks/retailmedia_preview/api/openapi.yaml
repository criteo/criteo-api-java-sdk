openapi: 3.0.1
info:
  description: Criteo API - RetailMedia
  title: Criteo API
  version: Preview
servers:
- url: https://api.criteo.com
security:
- oauth: []
tags:
- name: Accounts
- name: Analytics
- name: Audience
- name: Balance
- name: Campaign
- name: Catalog
- name: Gateway
- name: OnSiteRecommendation
- name: ThirdPartyAccounts
paths:
  /preview/retail-media/account-management/accounts/{accountId}/private-market-child-accounts:
    get:
      description: Gets Private Market child accounts that are associated with the
        given account
      operationId: GetPrivateMarketChildAccountsByAccountId
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: accountId
        required: true
        schema:
          type: string
        style: simple
      - description: The number of accounts to be returned. The default is 25.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 25
          format: int32
          type: integer
        style: form
      - description: The (zero-based) offset into the collection of accounts. The
          default is 0.
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResourceCollectionOutcomeOfRetailMediaChildAccountAndMetadata'
          description: Success
      security:
      - oauth:
        - RetailMedia_Accounts_Read
      tags:
      - Accounts
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audience-segments:
    patch:
      description: "Updates the properties of all segments with a valid configuration,\
        \ and returns the full segments. For those that cannot be updated, one or\
        \ multiple errors are returned."
      operationId: bulkUpdateAudienceSegments
      parameters:
      - description: Account id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceSegmentBulkUpdateInputV1'
        description: Segment Update request
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceSegmentEntityV1ListResponse'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Manage
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audience-segments/{audience-segment-id}/contact-list:
    get:
      description: Returns the statistics of a contact list segment.
      operationId: getAudienceSegmentContactListStatistics
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      - description: Segment Id.
        explode: false
        in: path
        name: audience-segment-id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmContactListStatisticsEntityV1Response'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Read
      tags:
      - Audience
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audience-segments/compute-sizes:
    post:
      description: Gets the size of all segments. An error is returned for those whose
        size calculation is not supported.
      operationId: computeAudienceSegmentsSizes
      parameters:
      - description: Account id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceSegmentComputeSizesInputV1'
        description: ""
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceSegmentSizeEntityV1ListResponse'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Manage
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audience-segments/create:
    post:
      description: "Creates all segments with a valid configuration, and returns the\
        \ full segments. For those that cannot be created, one or multiple errors\
        \ are returned."
      operationId: bulkCreateAudienceSegments
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceSegmentBulkCreateInputV1'
        description: Segment creation parameter
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceSegmentEntityV1ListResponse'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Manage
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audience-segments/delete:
    post:
      description: Delete the segments associated to the given IDs.
      operationId: bulkDeleteAudienceSegments
      parameters:
      - description: Account id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceSegmentBulkDeleteInputV1'
        description: Segment delete request.
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceSegmentIdEntityV1ListResponse'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Manage
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audience-segments/estimate-size:
    post:
      description: Gets the size estimation of a non existent segment. An error is
        returned when size calculation is not supported.
      operationId: estimateAudienceSegmentSize
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceSegmentEstimateSizeInputV1'
        description: ""
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceSegmentSizeEstimationV1Response'
          description: Success
      security:
      - oauth:
        - RetailMedia_Audience_Manage
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audience-segments/search:
    post:
      description: "Returns a list of segments that match the provided filters. If\
        \ present, the filters are AND'ed together when applied."
      operationId: searchAudienceSegments
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      - description: The number of elements to be returned. The default is 50 and
          the maximum is 500.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          format: int32
          maximum: 500
          minimum: 0
          type: integer
        style: form
      - description: The (zero-based) offset into the collection. The default is 0.
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          type: integer
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceSegmentSearchInputV1'
        description: Segment search filters.
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceSegmentEntityV1RmAudienceSegmentSearchMetadataV1ListResponse'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Read
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audiences:
    patch:
      description: "Updates the properties of all audiences with a valid configuration,\
        \ and returns their IDs. For those that cannot be updated, one or multiple\
        \ errors are returned."
      operationId: bulkUpdateAudience
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceBulkUpdateInputV1'
        description: ""
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceEntityV1ListResponse'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Manage
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audiences/compute-sizes:
    post:
      description: Gets the size of all audiences. An error is returned for those
        whose size calculation is not supported.
      operationId: computeAudiencesSizes
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceComputeSizesInputV1'
        description: ""
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceSizeEntityV1ListResponse'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Manage
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audiences/create:
    post:
      description: "Creates all audiences with a valid configuration, and returns\
        \ their IDs. For those that cannot be created, one or multiple errors are\
        \ returned."
      operationId: bulkCreateAudience
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceBulkCreateInputV1'
        description: Audience creation parameter
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceEntityV1ListResponse'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Manage
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audiences/delete:
    post:
      description: Deletes the audiences associated to the given IDs.
      operationId: bulkDeleteAudiences
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceBulkDeleteInputV1'
        description: ""
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceSegmentIdEntityV1ListResponse'
          description: Success
        "204":
          content:
            application/json: {}
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Manage
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audiences/estimate-size:
    post:
      description: Gets the size estimation of a non existent audience. An error is
        returned when size calculation is not supported.
      operationId: estimateAudienceSize
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceEstimateSizeInputV1'
        description: ""
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceSizeEstimationV1Response'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Manage
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/audiences/search:
    post:
      description: "Returns a list of audiences that match the provided filters. If\
        \ present, the filters are AND'ed together when applied."
      operationId: searchAudiences
      parameters:
      - description: Account Id
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      - description: The number of elements to be returned. The default is 50 and
          the maximum is 500.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          format: int32
          maximum: 500
          minimum: 0
          type: integer
        style: form
      - description: The (zero-based) offset into the collection. The default is 0.
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          type: integer
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RmAudienceSearchInputV1'
        description: Audience search filters.
        required: true
        x-bodyName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RmAudienceEntityV1RmAudienceSearchMetadataV1ListResponse'
          description: Success or partial success
      security:
      - oauth:
        - RetailMedia_Audience_Read
      tags:
      - Audience
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/balances/{balance-id}:
    patch:
      description: Modify a balance for the given account id
      operationId: UpdateBalanceV1
      parameters:
      - description: The account of the balance
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      - description: The balance to change the dates
        explode: false
        in: path
        name: balance-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValueResourceInputOfUpdateBalanceModelV1'
        description: An object that represents the available options to modify a balance.
        required: true
      responses:
        "200":
          description: Success
      security:
      - oauth:
        - RetailMedia_Balance_Manage
      tags:
      - Balance
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/creatives:
    post:
      description: Create a creative for an account
      operationId: CreateCreative
      parameters:
      - description: External account id to create a creative for
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreativeCreateModel2'
        description: The creative to create
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Creative2Response'
          description: Creatives created
      security:
      - oauth:
        - RetailMedia_Campaign_Manage
      tags:
      - Campaign
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/creatives/{creative-id}:
    get:
      description: Get the specified creative
      operationId: GetCreative
      parameters:
      - description: External account id to retrieve creatives for
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      - description: Creative to get
        explode: false
        in: path
        name: creative-id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Creative2Response'
          description: Creatives found
      security:
      - oauth:
        - RetailMedia_Campaign_Read
      tags:
      - Campaign
      x-accepts: application/json
    put:
      description: Update a creative
      operationId: UpdateCreative
      parameters:
      - description: External account id containing the creative
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      - description: Creative to update
        explode: false
        in: path
        name: creative-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreativeUpdateModel2'
        description: The creative to create
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Creative2Response'
          description: Success
        "204":
          description: Creative updated
      security:
      - oauth:
        - RetailMedia_Campaign_Manage
      tags:
      - Campaign
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/creatives/search:
    post:
      description: Get account creatives
      operationId: SearchAccountCreatives
      parameters:
      - description: External account id to retrieve creatives for
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      - description: limit to paginated result
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          format: int32
          maximum: 500
          minimum: 1
          type: integer
        style: form
      - description: offset to paginated result
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityResourceInputCreativeSearchRequest'
        description: search request filter
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResourceCollectionOutcomeCreativeSearchResponse'
          description: Creatives found
      security:
      - oauth:
        - RetailMedia_Campaign_Read
      tags:
      - Campaign
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{account-id}/line-items/cap-out-history:
    post:
      description: Get the cap out history for line items
      operationId: GetCapoutHistory
      parameters:
      - description: account id that own the lineitem
        explode: false
        in: path
        name: account-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValueResourceInputLineItemBudgetCapOutHistoryRequest'
        description: lineitem budgetcapout history  object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValueResourceOutcomeLineItemBudgetCapOutHistoryResponse'
          description: Success
      security:
      - oauth:
        - RetailMedia_Campaign_Read
      tags:
      - Campaign
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{accountId}/auction-display-line-items/search:
    post:
      description: Searches for auction display line items based on various filters.
      operationId: SearchAuctionDisplayLineItems
      parameters:
      - description: The id of the account to search line items for.
        explode: false
        in: path
        name: accountId
        required: true
        schema:
          type: string
        style: simple
      - description: Optional list of field names to include in the response (e.g.
          "proposalStatus").
        explode: true
        in: query
        name: fields
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: The maximum number of items to return. Must be between 1 and
          5. Default is 2.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 2
          format: int32
          maximum: 5
          minimum: 1
          type: integer
        style: form
      - description: The number of items to skip before starting to collect the result
          set. Default is 0.
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValueResourceInputOfAuctionDisplayLineItemSearchModel'
        description: "The search filters to apply, including line item IDs and proposal\
          \ filter."
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResourceCollectionOutcomeOfAuctionDisplayLineItemSearchResultAndMetadata'
          description: Success
      security:
      - oauth:
        - RetailMedia_Campaign_Read
      tags:
      - Campaign
      x-content-type: application/json
      x-accepts: application/json
  /preview/retail-media/accounts/{accountId}/balances:
    get:
      description: Gets page of balance objects for the given account id.
      operationId: GetPageOfBalancesV1
      parameters:
      - description: The account to get balances for.
        explode: false
        in: path
        name: accountId
        required: true
        schema:
          type: string
        style: simple
      - description: The number of elements to be returned.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 25
          format: int32
          maximum: 500
          minimum: 1
          type: integer
        style: form
      - description: The balance ids which the result is limited to.
        explode: true
        in: query
        name: limit-to-id
        required: false
        schema:
          items:
            type: string
          maxItems: 50
          type: array
        style: form
      - description: The (zero-based) starting offset in the collection.
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResourceCollectionOutcomeBalanceV1AndMetadata'
          description: Success
      security:
      - oauth:
        - RetailMedia_Balance_Read
      tags:
      - Balance
      x-accepts: application/json
  /preview/retail-media/accounts/{accountId}/display-campaigns:
    post:
      description: Creates a new display campaign with the specified settings.
      operationId: CreateDisplayCampaign
      parameters:
      - description: The id of the account to which the campaign belongs
        explode: false
        in: path
        name: accountId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValueResourceInputOfDisplayCampaignCreateModel'
