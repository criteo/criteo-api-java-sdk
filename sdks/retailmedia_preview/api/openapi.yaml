    SyncRealTimePerformanceReport:
      description: "Real Time Performance report body request (one sheeter: startDate,\
        \ endDate (optional), RetailerIds, accountIds, campaignIds, lineItemIds, dimensions,\
        \ metrics, timezones).\r\nExtends SyncReport only (no default filters); adds\
        \ entry filter arrays.\r\nDimensions and metrics are restricted to Criteo.RetailMedia.Exam.Reporting.Resources.Models.Inputs.RealTimePerformance.SyncRealTimeDimension\
        \ and Criteo.RetailMedia.Exam.Reporting.Resources.Models.Inputs.RealTimePerformance.SyncRealTimeMetric;\
        \ invalid values cause deserialization to fail."
      example:
        endDate: 2000-01-23T04:56:07.000+00:00
        lineItemIds:
        - lineItemIds
        - lineItemIds
        accountIds:
        - accountIds
        - accountIds
        timezone: UTC
        campaignIds:
        - campaignIds
        - campaignIds
        metrics:
        - billableImpressions
        - billableImpressions
        retailerIds:
        - retailerIds
        - retailerIds
        startDate: 2000-01-23T04:56:07.000+00:00
        dimensions:
        - date
        - date
      properties:
        accountIds:
          description: Account ids to filter (plural; base has AccountId for single
            account).
          items:
            type: string
          type: array
        campaignIds:
          description: Campaign ids to filter.
          items:
            type: string
          type: array
        dimensions:
          description: "List of dimensions to report on (real-time: at least one required).\
            \ Only values from Criteo.RetailMedia.Exam.Reporting.Resources.Models.Inputs.RealTimePerformance.SyncRealTimeDimension\
            \ are valid."
          items:
            description: "Dimensions supported by the real-time performance report\
              \ (streaming + landing).\r\nOnly these values are accepted; invalid\
              \ values cause deserialization to fail."
            enum:
            - date
            - hour
            - accountId
            - accountName
            - campaignId
            - campaignName
            - lineItemId
            - lineItemName
            - retailerId
            - retailerName
            type: string
          type: array
        endDate:
          description: "Optional end date/time (inclusive in the request timezone).\
            \ If empty or not provided, no end date filter is applied.\r\nWhen provided,\
            \ used as the inclusive upper bound for the report range.\r\nHides base\
            \ Report.EndDate so this report can treat end date as optional (no [Required])."
          format: date-time
          type: string
        lineItemIds:
          description: Line item ids to filter.
          items:
            type: string
          type: array
        metrics:
          description: "List of metrics to report on (real-time: at least one required).\
            \ Only values from Criteo.RetailMedia.Exam.Reporting.Resources.Models.Inputs.RealTimePerformance.SyncRealTimeMetric\
            \ are valid (billableImpressions, billableClicks, spend)."
          items:
            description: "Metrics supported by the real-time performance report (streaming\
              \ + landing).\r\nOnly these values are accepted; invalid values cause\
              \ deserialization to fail."
            enum:
